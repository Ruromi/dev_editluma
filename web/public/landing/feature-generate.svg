<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0e1a40;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0520;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#1e0a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b0764;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="280" rx="16" fill="url(#bg)"/>

  <!-- Main generation canvas -->
  <rect x="30" y="40" width="340" height="175" rx="12" fill="url(#canvas)" stroke="#4c1d95" stroke-width="1"/>

  <!-- Center radial glow (AI generation point) -->
  <ellipse cx="200" cy="127" rx="80" ry="70" fill="url(#centerGlow)"/>

  <!-- Neural network nodes -->
  <!-- Outer ring -->
  <circle cx="200" cy="60" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="260" cy="80" r="4" fill="#a855f7" opacity="0.7"/>
  <circle cx="290" cy="127" r="5" fill="#7c3aed" opacity="0.8"/>
  <circle cx="260" cy="175" r="4" fill="#818cf8" opacity="0.7"/>
  <circle cx="200" cy="195" r="5" fill="#a855f7" opacity="0.8"/>
  <circle cx="140" cy="175" r="4" fill="#7c3aed" opacity="0.7"/>
  <circle cx="110" cy="127" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="140" cy="80" r="4" fill="#a855f7" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="200" cy="90" r="4" fill="#c084fc" opacity="0.9"/>
  <circle cx="235" cy="105" r="3" fill="#e879f9" opacity="0.8"/>
  <circle cx="245" cy="140" r="4" fill="#c084fc" opacity="0.9"/>
  <circle cx="225" cy="165" r="3" fill="#e879f9" opacity="0.8"/>
  <circle cx="175" cy="165" r="4" fill="#c084fc" opacity="0.9"/>
  <circle cx="155" cy="140" r="3" fill="#e879f9" opacity="0.8"/>
  <circle cx="165" cy="105" r="4" fill="#c084fc" opacity="0.9"/>

  <!-- Connection lines (outer to inner) -->
  <g opacity="0.3">
    <line x1="200" y1="60" x2="200" y2="90" stroke="#818cf8" stroke-width="1"/>
    <line x1="260" y1="80" x2="235" y2="105" stroke="#a855f7" stroke-width="1"/>
    <line x1="290" y1="127" x2="245" y2="140" stroke="#7c3aed" stroke-width="1"/>
    <line x1="260" y1="175" x2="225" y2="165" stroke="#818cf8" stroke-width="1"/>
    <line x1="200" y1="195" x2="175" y2="165" stroke="#a855f7" stroke-width="1"/>
    <line x1="140" y1="175" x2="155" y2="140" stroke="#7c3aed" stroke-width="1"/>
    <line x1="110" y1="127" x2="165" y2="105" stroke="#818cf8" stroke-width="1"/>
    <line x1="140" y1="80" x2="165" y2="105" stroke="#a855f7" stroke-width="1"/>
  </g>
  <!-- Inner to center connections -->
  <g opacity="0.4">
    <line x1="200" y1="90" x2="200" y2="127" stroke="#c084fc" stroke-width="1"/>
    <line x1="235" y1="105" x2="200" y2="127" stroke="#e879f9" stroke-width="1"/>
    <line x1="245" y1="140" x2="200" y2="127" stroke="#c084fc" stroke-width="1"/>
    <line x1="225" y1="165" x2="200" y2="127" stroke="#e879f9" stroke-width="1"/>
    <line x1="175" y1="165" x2="200" y2="127" stroke="#c084fc" stroke-width="1"/>
    <line x1="155" y1="140" x2="200" y2="127" stroke="#e879f9" stroke-width="1"/>
    <line x1="165" y1="105" x2="200" y2="127" stroke="#c084fc" stroke-width="1"/>
  </g>

  <!-- Center: AI generation core -->
  <g filter="url(#softGlow)">
    <circle cx="200" cy="127" r="18" fill="#7c3aed" opacity="0.9"/>
    <text x="200" y="132" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">✦</text>
  </g>

  <!-- Sparkle particles floating -->
  <g filter="url(#glow)">
    <text x="70" y="75" font-family="system-ui,sans-serif" font-size="12" fill="#fbbf24" opacity="0.8">✦</text>
    <text x="320" y="90" font-family="system-ui,sans-serif" font-size="10" fill="#f0abfc" opacity="0.7">✦</text>
    <text x="55" y="160" font-family="system-ui,sans-serif" font-size="8" fill="#a78bfa" opacity="0.6">✦</text>
    <text x="335" y="170" font-family="system-ui,sans-serif" font-size="11" fill="#fbbf24" opacity="0.7">✦</text>
    <text x="150" y="55" font-family="system-ui,sans-serif" font-size="9" fill="#c084fc" opacity="0.6">✦</text>
    <text x="250" y="58" font-family="system-ui,sans-serif" font-size="8" fill="#818cf8" opacity="0.7">✦</text>
  </g>

  <!-- "Generating..." indicator -->
  <rect x="140" y="190" width="120" height="20" rx="10" fill="#1a0533" stroke="#4c1d95" stroke-width="1"/>
  <text x="200" y="203" font-family="system-ui,sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">● Generating image...</text>

  <!-- Bottom title -->
  <text x="200" y="238" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">AI 이미지 생성</text>
  <text x="200" y="258" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">텍스트 프롬프트로 새 이미지 생성</text>
</svg>
