<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1060;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0764"/>
      <stop offset="100%" style="stop-color:#6b21a8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="280" rx="16" fill="url(#bg)"/>

  <!-- Before card (pixelated) -->
  <rect x="20" y="50" width="140" height="140" rx="10" fill="url(#card1)" stroke="#3730a3" stroke-width="1"/>
  <!-- Pixel grid -->
  <g opacity="0.7">
    <rect x="30" y="60" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="50" y="60" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="70" y="60" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="90" y="60" width="18" height="18" rx="2" fill="#2d2b7a"/>
    <rect x="110" y="60" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="130" y="60" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="30" y="80" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="50" y="80" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="70" y="80" width="18" height="18" rx="2" fill="#4338ca"/>
    <rect x="90" y="80" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="110" y="80" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="130" y="80" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="30" y="100" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="50" y="100" width="18" height="18" rx="2" fill="#4338ca"/>
    <rect x="70" y="100" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="90" y="100" width="18" height="18" rx="2" fill="#2d2b7a"/>
    <rect x="110" y="100" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="130" y="100" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="30" y="120" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="50" y="120" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="70" y="120" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="90" y="120" width="18" height="18" rx="2" fill="#4338ca"/>
    <rect x="110" y="120" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="130" y="120" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="30" y="140" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="50" y="140" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="70" y="140" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="90" y="140" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="110" y="140" width="18" height="18" rx="2" fill="#4338ca"/>
    <rect x="130" y="140" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="30" y="160" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="50" y="160" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="70" y="160" width="18" height="18" rx="2" fill="#2d2b7a"/>
    <rect x="90" y="160" width="18" height="18" rx="2" fill="#1e1b4b"/>
    <rect x="110" y="160" width="18" height="18" rx="2" fill="#312e81"/>
    <rect x="130" y="160" width="18" height="18" rx="2" fill="#4338ca"/>
  </g>
  <text x="90" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">저화질 (SD)</text>

  <!-- Arrow -->
  <g filter="url(#glow)">
    <line x1="172" y1="120" x2="220" y2="120" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="218,114 228,120 218,126" fill="#a855f7"/>
    <!-- Sparkle above arrow -->
    <text x="196" y="110" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle" fill="#fbbf24">✦</text>
    <text x="186" y="118" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#c084fc" opacity="0.8">AI</text>
  </g>

  <!-- After card (sharp/detailed) -->
  <rect x="240" y="50" width="140" height="140" rx="10" fill="url(#card2)" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Smooth gradient shapes representing sharp image -->
  <ellipse cx="310" cy="105" rx="45" ry="38" fill="#7c3aed" opacity="0.5"/>
  <ellipse cx="330" cy="130" rx="35" ry="28" fill="#a855f7" opacity="0.4"/>
  <ellipse cx="285" cy="140" rx="30" ry="22" fill="#6d28d9" opacity="0.3"/>
  <!-- Detail lines -->
  <line x1="258" y1="85" x2="330" y2="85" stroke="#c084fc" stroke-width="0.5" opacity="0.6"/>
  <line x1="258" y1="95" x2="360" y2="95" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="258" y1="155" x2="370" y2="155" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="258" y1="165" x2="350" y2="165" stroke="#c084fc" stroke-width="0.5" opacity="0.6"/>
  <!-- Highlight dots -->
  <circle cx="295" cy="92" r="2.5" fill="#f0abfc" opacity="0.9"/>
  <circle cx="340" cy="115" r="2" fill="#e879f9" opacity="0.8"/>
  <circle cx="360" cy="90" r="1.5" fill="#a78bfa" opacity="0.9"/>
  <!-- 4K badge -->
  <rect x="343" y="55" width="30" height="16" rx="3" fill="#7c3aed"/>
  <text x="358" y="66" font-family="system-ui,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">4K</text>
  <text x="310" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">고화질 (4K AI)</text>

  <!-- Bottom title -->
  <text x="200" y="235" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">화질 보정 · Upscale</text>
  <text x="200" y="255" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Real-ESRGAN 기반 최대 4K 업스케일링</text>
</svg>
