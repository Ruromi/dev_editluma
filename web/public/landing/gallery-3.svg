<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0f0a20"/>
      <stop offset="100%" style="stop-color:#1a0a30"/>
    </linearGradient>
    <linearGradient id="portalGrad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox" id="radialPortal">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#4f46e5;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a0533;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e879f9;stop-opacity:0.9"/>
      <stop offset="30%" style="stop-color:#a855f7;stop-opacity:0.7"/>
      <stop offset="70%" style="stop-color:#4f46e5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="85%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Distant stars (small) -->
  <g fill="white">
    <circle cx="15" cy="20" r="0.8" opacity="0.7"/>
    <circle cx="45" cy="10" r="0.6" opacity="0.6"/>
    <circle cx="80" cy="35" r="0.8" opacity="0.8"/>
    <circle cx="130" cy="15" r="0.6" opacity="0.5"/>
    <circle cx="170" cy="8" r="0.8" opacity="0.7"/>
    <circle cx="220" cy="28" r="0.6" opacity="0.6"/>
    <circle cx="270" cy="12" r="0.8" opacity="0.7"/>
    <circle cx="320" cy="32" r="0.6" opacity="0.5"/>
    <circle cx="360" cy="18" r="0.8" opacity="0.8"/>
    <circle cx="390" cy="45" r="0.6" opacity="0.6"/>
    <circle cx="25" cy="60" r="0.6" opacity="0.5"/>
    <circle cx="55" cy="80" r="0.8" opacity="0.7"/>
    <circle cx="95" cy="55" r="0.6" opacity="0.6"/>
    <circle cx="340" cy="65" r="0.8" opacity="0.7"/>
    <circle cx="375" cy="80" r="0.6" opacity="0.5"/>
    <circle cx="10" cy="200" r="0.8" opacity="0.6"/>
    <circle cx="380" cy="220" r="0.6" opacity="0.7"/>
    <circle cx="20" cy="270" r="0.8" opacity="0.5"/>
    <circle cx="370" cy="260" r="0.6" opacity="0.6"/>
  </g>

  <!-- Nebula cloud background -->
  <ellipse cx="200" cy="150" rx="180" ry="130" fill="#1a0533" opacity="0.6"/>
  <ellipse cx="160" cy="140" rx="120" ry="90" fill="#0d0030" opacity="0.4"/>
  <ellipse cx="250" cy="160" rx="100" ry="80" fill="#1a0a40" opacity="0.4"/>

  <!-- Outer portal rings -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="150" r="100" fill="none" stroke="#6d28d9" stroke-width="0.8" opacity="0.4"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- Portal glow rings -->
  <circle cx="200" cy="150" r="65" fill="url(#ringGlow)"/>
  <circle cx="200" cy="150" r="65" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8" filter="url(#glow)"/>

  <!-- Inner portal fill -->
  <circle cx="200" cy="150" r="55" fill="url(#coreGlow)"/>

  <!-- Core bright center -->
  <circle cx="200" cy="150" r="20" fill="#e879f9" opacity="0.9" filter="url(#softGlow)"/>
  <circle cx="200" cy="150" r="8" fill="white" opacity="0.95" filter="url(#glow)"/>

  <!-- Light rays from center -->
  <g opacity="0.25" filter="url(#glow)">
    <line x1="200" y1="150" x2="200" y2="30" stroke="#e879f9" stroke-width="2"/>
    <line x1="200" y1="150" x2="200" y2="270" stroke="#e879f9" stroke-width="2"/>
    <line x1="200" y1="150" x2="80" y2="150" stroke="#a855f7" stroke-width="2"/>
    <line x1="200" y1="150" x2="320" y2="150" stroke="#a855f7" stroke-width="2"/>
    <line x1="200" y1="150" x2="115" y2="65" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="200" y1="150" x2="285" y2="65" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="200" y1="150" x2="115" y2="235" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="200" y1="150" x2="285" y2="235" stroke="#c084fc" stroke-width="1.5"/>
  </g>

  <!-- Sparkle dots around portal -->
  <g filter="url(#glow)">
    <circle cx="200" cy="82" r="2.5" fill="#f0abfc" opacity="0.9"/>
    <circle cx="253" cy="100" r="2" fill="#c084fc" opacity="0.8"/>
    <circle cx="268" cy="150" r="2.5" fill="#a78bfa" opacity="0.9"/>
    <circle cx="253" cy="200" r="2" fill="#c084fc" opacity="0.8"/>
    <circle cx="200" cy="218" r="2.5" fill="#f0abfc" opacity="0.9"/>
    <circle cx="147" cy="200" r="2" fill="#c084fc" opacity="0.8"/>
    <circle cx="132" cy="150" r="2.5" fill="#a78bfa" opacity="0.9"/>
    <circle cx="147" cy="100" r="2" fill="#c084fc" opacity="0.8"/>
  </g>

  <!-- AI Generated badge -->
  <rect x="10" y="272" width="100" height="20" rx="4" fill="#1a0533" opacity="0.9"/>
  <rect x="10" y="272" width="100" height="20" rx="4" stroke="#a855f7" stroke-width="0.5"/>
  <text x="60" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">✦ AI Generated</text>
</svg>
