<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1a2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.4"/>
      <stop offset="30%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="280" rx="16" fill="url(#bg)"/>

  <!-- Waveform background track (video/image) -->
  <rect x="30" y="50" width="340" height="60" rx="8" fill="#0a1a20" stroke="#1e3a2a" stroke-width="1" opacity="0.8"/>
  <text x="45" y="73" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">VIDEO TRACK</text>
  <!-- Video wave shape (subtle) -->
  <polyline points="40,90 60,75 75,88 90,72 110,85 130,70 150,83 170,75 190,88 210,73 230,86 250,70 270,83 290,75 310,88 330,72 350,85 365,78 370,90" fill="none" stroke="#374151" stroke-width="1.5"/>

  <!-- BGM waveform track (main) -->
  <rect x="30" y="125" width="340" height="80" rx="8" fill="#051a10" stroke="#064e3b" stroke-width="1"/>
  <text x="45" y="145" font-family="system-ui,sans-serif" font-size="10" fill="#10b981">BGM TRACK · Auto-Matched</text>

  <!-- Waveform bars (equalizer style) -->
  <g filter="url(#glow)">
    <!-- Bar heights vary to simulate audio waveform -->
    <rect x="42" y="177" width="6" height="20" rx="2" fill="url(#barGrad1)"/>
    <rect x="52" y="170" width="6" height="27" rx="2" fill="url(#barGrad1)"/>
    <rect x="62" y="162" width="6" height="35" rx="2" fill="url(#barGrad1)"/>
    <rect x="72" y="172" width="6" height="25" rx="2" fill="url(#barGrad1)"/>
    <rect x="82" y="158" width="6" height="39" rx="2" fill="url(#barGrad2)"/>
    <rect x="92" y="163" width="6" height="34" rx="2" fill="url(#barGrad2)"/>
    <rect x="102" y="155" width="6" height="42" rx="2" fill="url(#barGrad2)"/>
    <rect x="112" y="168" width="6" height="29" rx="2" fill="url(#barGrad1)"/>
    <rect x="122" y="160" width="6" height="37" rx="2" fill="url(#barGrad1)"/>
    <rect x="132" y="153" width="6" height="44" rx="2" fill="url(#barGrad2)"/>
    <rect x="142" y="148" width="6" height="49" rx="2" fill="url(#barGrad2)"/>
    <rect x="152" y="156" width="6" height="41" rx="2" fill="url(#barGrad2)"/>
    <rect x="162" y="150" width="6" height="47" rx="2" fill="url(#barGrad1)"/>
    <rect x="172" y="145" width="6" height="52" rx="2" fill="url(#barGrad1)"/>
    <rect x="182" y="152" width="6" height="45" rx="2" fill="url(#barGrad2)"/>
    <rect x="192" y="148" width="6" height="49" rx="2" fill="url(#barGrad2)"/>
    <rect x="202" y="155" width="6" height="42" rx="2" fill="url(#barGrad1)"/>
    <rect x="212" y="160" width="6" height="37" rx="2" fill="url(#barGrad1)"/>
    <rect x="222" y="153" width="6" height="44" rx="2" fill="url(#barGrad2)"/>
    <rect x="232" y="158" width="6" height="39" rx="2" fill="url(#barGrad1)"/>
    <rect x="242" y="164" width="6" height="33" rx="2" fill="url(#barGrad1)"/>
    <rect x="252" y="168" width="6" height="29" rx="2" fill="url(#barGrad2)"/>
    <rect x="262" y="160" width="6" height="37" rx="2" fill="url(#barGrad2)"/>
    <rect x="272" y="155" width="6" height="42" rx="2" fill="url(#barGrad1)"/>
    <rect x="282" y="163" width="6" height="34" rx="2" fill="url(#barGrad1)"/>
    <rect x="292" y="170" width="6" height="27" rx="2" fill="url(#barGrad2)"/>
    <rect x="302" y="172" width="6" height="25" rx="2" fill="url(#barGrad1)"/>
    <rect x="312" y="167" width="6" height="30" rx="2" fill="url(#barGrad1)"/>
    <rect x="322" y="174" width="6" height="23" rx="2" fill="url(#barGrad2)"/>
    <rect x="332" y="178" width="6" height="19" rx="2" fill="url(#barGrad1)"/>
    <rect x="342" y="176" width="6" height="21" rx="2" fill="url(#barGrad2)"/>
    <rect x="352" y="180" width="6" height="17" rx="2" fill="url(#barGrad1)"/>
  </g>

  <!-- Playhead indicator -->
  <line x1="175" y1="125" x2="175" y2="205" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
  <polygon points="171,125 179,125 175,131" fill="#fbbf24" opacity="0.8"/>

  <!-- Musical notes floating -->
  <g filter="url(#glow)" font-family="serif" fill="#10b981">
    <text x="50" y="38" font-size="20" opacity="0.7">♪</text>
    <text x="160" y="35" font-size="16" opacity="0.6">♫</text>
    <text x="290" y="40" font-size="18" opacity="0.7">♩</text>
    <text x="340" y="33" font-size="14" opacity="0.5">♬</text>
    <text x="110" y="36" font-size="12" fill="#34d399" opacity="0.5">♪</text>
    <text x="230" y="37" font-size="14" fill="#67e8f9" opacity="0.6">♫</text>
  </g>

  <!-- AI match badge -->
  <rect x="260" y="130" width="100" height="18" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
  <text x="310" y="142" font-family="system-ui,sans-serif" font-size="9" fill="#34d399" text-anchor="middle">● AI 무드 매칭 완료</text>

  <!-- Bottom title -->
  <text x="200" y="235" font-family="system-ui,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">BGM 자동 삽입</text>
  <text x="200" y="255" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">영상 분위기 분석 → BGM 자동 매칭 · 삽입</text>
</svg>
