<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d0a5c"/>
      <stop offset="100%" style="stop-color:#0a0520"/>
    </linearGradient>
    <linearGradient id="cityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0a40"/>
      <stop offset="100%" style="stop-color:#050210"/>
    </linearGradient>
    <radialGradient id="lampGlow1" cx="25%" cy="70%" r="15%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="lampGlow2" cx="75%" cy="65%" r="12%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Ambient lamp glows -->
  <rect width="400" height="300" fill="url(#lampGlow1)"/>
  <rect width="400" height="300" fill="url(#lampGlow2)"/>

  <!-- City silhouette - buildings -->
  <!-- Far buildings -->
  <rect x="0" y="130" width="30" height="170" fill="url(#cityGrad)"/>
  <rect x="25" y="110" width="25" height="190" fill="url(#cityGrad)"/>
  <rect x="45" y="90" width="20" height="210" fill="url(#cityGrad)"/>
  <rect x="60" y="120" width="30" height="180" fill="url(#cityGrad)"/>
  <rect x="85" y="100" width="25" height="200" fill="url(#cityGrad)"/>
  <rect x="105" y="80" width="18" height="220" fill="url(#cityGrad)"/>
  <rect x="118" y="105" width="22" height="195" fill="url(#cityGrad)"/>
  <rect x="135" y="70" width="30" height="230" fill="url(#cityGrad)"/>
  <rect x="160" y="95" width="20" height="205" fill="url(#cityGrad)"/>
  <rect x="175" y="60" width="25" height="240" fill="url(#cityGrad)"/>
  <rect x="195" y="85" width="18" height="215" fill="url(#cityGrad)"/>
  <rect x="208" y="100" width="28" height="200" fill="url(#cityGrad)"/>
  <rect x="230" y="75" width="22" height="225" fill="url(#cityGrad)"/>
  <rect x="247" y="90" width="30" height="210" fill="url(#cityGrad)"/>
  <rect x="272" y="65" width="20" height="235" fill="url(#cityGrad)"/>
  <rect x="287" y="100" width="25" height="200" fill="url(#cityGrad)"/>
  <rect x="307" y="85" width="18" height="215" fill="url(#cityGrad)"/>
  <rect x="320" y="110" width="28" height="190" fill="url(#cityGrad)"/>
  <rect x="343" y="90" width="22" height="210" fill="url(#cityGrad)"/>
  <rect x="360" y="75" width="20" height="225" fill="url(#cityGrad)"/>
  <rect x="375" y="105" width="25" height="195" fill="url(#cityGrad)"/>

  <!-- Building windows (lit) -->
  <g fill="#fbbf24" opacity="0.6">
    <rect x="28" y="115" width="4" height="4" rx="1"/>
    <rect x="50" y="95" width="4" height="4" rx="1"/>
    <rect x="88" y="105" width="4" height="4" rx="1"/>
    <rect x="110" y="85" width="3" height="3" rx="1"/>
    <rect x="140" y="78" width="4" height="4" rx="1"/>
    <rect x="155" y="92" width="3" height="3" rx="1"/>
    <rect x="178" y="67" width="4" height="4" rx="1"/>
    <rect x="185" y="82" width="3" height="3" rx="1"/>
    <rect x="212" y="108" width="4" height="4" rx="1"/>
    <rect x="235" y="82" width="3" height="3" rx="1"/>
    <rect x="253" y="97" width="4" height="4" rx="1"/>
    <rect x="275" y="72" width="4" height="4" rx="1"/>
    <rect x="292" y="107" width="3" height="3" rx="1"/>
    <rect x="325" y="118" width="4" height="4" rx="1"/>
    <rect x="346" y="98" width="4" height="4" rx="1"/>
    <rect x="363" y="83" width="3" height="3" rx="1"/>
  </g>
  <g fill="#f97316" opacity="0.5">
    <rect x="35" y="135" width="3" height="3" rx="1"/>
    <rect x="62" y="128" width="3" height="3" rx="1"/>
    <rect x="120" y="115" width="3" height="3" rx="1"/>
    <rect x="165" y="110" width="3" height="3" rx="1"/>
    <rect x="200" y="100" width="3" height="3" rx="1"/>
    <rect x="250" y="108" width="3" height="3" rx="1"/>
    <rect x="310" y="105" width="3" height="3" rx="1"/>
    <rect x="370" y="115" width="3" height="3" rx="1"/>
  </g>

  <!-- Street level (ground) -->
  <rect x="0" y="230" width="400" height="70" fill="#030108"/>

  <!-- Street lights & reflections -->
  <g filter="url(#glow)">
    <circle cx="100" cy="228" r="3" fill="#fbbf24"/>
    <line x1="100" y1="228" x2="100" y2="300" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
    <circle cx="300" cy="225" r="3" fill="#f97316"/>
    <line x1="300" y1="225" x2="300" y2="300" stroke="#f97316" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Wet street reflection (shimmer) -->
  <ellipse cx="100" cy="250" rx="40" ry="8" fill="#fbbf24" opacity="0.08"/>
  <ellipse cx="300" cy="248" rx="35" ry="7" fill="#f97316" opacity="0.08"/>

  <!-- AI Enhanced badge -->
  <rect x="10" y="272" width="90" height="20" rx="4" fill="#1a0533" opacity="0.9"/>
  <rect x="10" y="272" width="90" height="20" rx="4" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="55" y="285" font-family="system-ui,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">✦ AI Enhanced</text>
</svg>
